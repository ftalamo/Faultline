<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faultline</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<link rel="stylesheet" href="riskmap.css">
</head>
<body>

<div id="topbar">
  <a href="index.html" class="nav-back">← Faultline</a>
  <div class="sep"></div>
  <button class="mode-btn active" id="btn-edit"       onclick="setMode('edit')"></button>
  <button class="mode-btn"        id="btn-whatif"     onclick="setMode('whatif')"></button>
  <button class="mode-btn"        id="btn-montecarlo" onclick="setMode('montecarlo')"></button>
  <div class="topbar-right">
    <span class="sim-label" id="sim-label"></span>
    <button class="lang-btn active" id="btn-lang-en" onclick="setLang('en')">EN</button>
    <button class="lang-btn"        id="btn-lang-es" onclick="setLang('es')">ES</button>
    <button class="btn" id="topbar-export"  onclick="saveGraph()"></button>
    <button class="btn" id="topbar-example" onclick="loadExample()"></button>
  </div>
</div>

<div id="left">
  <div class="ptitle" id="left-nodes-title"></div>
  <div id="node-list"></div>
  <div class="psection">
    <div class="ptitle" id="left-addnode-title" style="padding:0 0 4px"></div>
    <div class="row">
      <input class="tinput" id="new-name" />
      <button class="btn pri" onclick="addNode()">+</button>
    </div>
  </div>
  <div class="psection">
    <div class="ptitle" id="left-connect-title" style="padding:0 0 4px"></div>
    <div class="row" style="flex-direction:column">
      <select class="tsel" id="edge-from"></select>
      <select class="tsel" id="edge-to"></select>
      <div class="row">
        <button class="btn pri" style="flex:1" id="btn-add-edge"    onclick="addEdge()"></button>
        <button class="btn dng"                id="btn-remove-edge" onclick="removeEdge()"></button>
      </div>
    </div>
  </div>
</div>

<div id="canvas">
  <div id="fail-banner"></div>
  <div id="whatif-box">
    <div class="ptitle" id="wi-title" style="padding:0 0 8px"></div>
    <div class="wrow"><span class="wlbl" id="wi-aff-lbl"></span>  <span id="wi-aff"  style="font-family:var(--mono);color:var(--danger)">—</span></div>
    <div class="wrow"><span class="wlbl" id="wi-act-lbl"></span>  <span id="wi-act"  style="font-family:var(--mono);color:var(--ok)">—</span></div>
    <div class="wrow"><span class="wlbl" id="wi-pct-lbl"></span>  <span id="wi-pct"  style="font-family:var(--mono);color:var(--warn)">—</span></div>
    <div class="wrow" style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border)">
      <span class="wlbl" id="wi-spof-lbl"></span><span id="wi-spof" style="font-family:var(--mono);color:var(--warn)">0</span>
    </div>
  </div>
  <div id="legend">
    <div class="litem"><div class="ldot" style="background:#2ecc88"></div><span id="legend-low"></span></div>
    <div class="litem"><div class="ldot" style="background:#f5a623"></div><span id="legend-med"></span></div>
    <div class="litem"><div class="ldot" style="background:#e8415a"></div><span id="legend-high"></span></div>
    <div class="litem"><div class="ldot" style="background:#5b7fff;outline:2px solid #f5a623;outline-offset:1px;border-radius:50%"></div><span id="legend-spof"></span></div>
  </div>
  <div id="canvas-btns">
    <button class="btn" id="canvas-relayout"   onclick="sim.alpha(.3).restart()"></button>
    <button class="btn dng" id="canvas-resetfails" onclick="resetFailed()"></button>
  </div>
</div>

<div id="right">
  <div class="ptitle" id="right-title"></div>
  <div id="right-content"></div>
</div>

<script src="riskmap.js"></script>
</body>
</html>
