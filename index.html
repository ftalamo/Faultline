<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faultline — Find the crack before everything breaks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink:#0e0f13; --ink2:#1c1e27; --ink3:#2e3144;
  --smoke:#6b7080; --mist:#a0a5b4; --paper:#f0efe9;
  --crack:#c84b2f; --crack2:#e8623f;
  --serif:'DM Serif Display',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --mono:'DM Mono',monospace;
}
html { scroll-behavior: smooth; }
body { font-family:var(--sans); background:var(--ink); color:var(--paper); min-height:100vh; overflow-x:hidden; }

nav {
  position:fixed; top:0; left:0; right:0; z-index:100;
  display:flex; align-items:center; justify-content:space-between;
  padding:20px 48px;
  background:linear-gradient(to bottom,rgba(14,15,19,.95) 0%,transparent 100%);
}
.nav-logo { font-family:var(--serif); font-size:18px; color:var(--paper); letter-spacing:-.01em; }
.nav-logo em { color:var(--crack); font-style:normal; }
.nav-right { display:flex; align-items:center; gap:12px; }
.lang-btn {
  font-family:var(--mono); font-size:11px; letter-spacing:.1em;
  padding:6px 12px; border-radius:3px; cursor:pointer;
  border:1px solid var(--ink3); background:transparent; color:var(--smoke);
  transition:all .15s;
}
.lang-btn.active { border-color:var(--smoke); color:var(--paper); }
.lang-btn:hover { color:var(--paper); }
.nav-cta {
  font-size:13px; font-weight:500; padding:8px 20px; border-radius:3px;
  background:var(--crack); color:#fff; text-decoration:none; transition:background .15s; letter-spacing:.02em;
}
.nav-cta:hover { background:var(--crack2); }

#hero {
  min-height:100vh; display:flex; flex-direction:column; justify-content:center;
  padding:120px 48px 80px; position:relative; overflow:hidden;
}
#bg-canvas { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; opacity:.18; }
.hero-eyebrow { font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--crack); margin-bottom:28px; }
.hero-headline { font-family:var(--serif); font-size:clamp(52px,7vw,96px); line-height:1.02; letter-spacing:-.03em; color:var(--paper); max-width:820px; position:relative; }
.crack-word { position:relative; display:inline-block; }
.crack-word::after {
  content:''; position:absolute; bottom:6px; left:0; right:0; height:3px;
  background:var(--crack);
  clip-path:polygon(0% 40%,18% 0%,22% 60%,40% 10%,44% 80%,62% 20%,66% 100%,84% 30%,88% 90%,100% 50%,100% 100%,0% 100%);
}
.hero-sub { margin-top:32px; font-size:18px; font-weight:300; color:var(--mist); max-width:480px; line-height:1.65; }
.hero-sub strong { color:var(--paper); font-weight:500; }
.hero-actions { margin-top:48px; display:flex; align-items:center; gap:20px; flex-wrap:wrap; }
.btn-launch { font-family:var(--sans); font-size:14px; font-weight:500; padding:14px 32px; border-radius:3px; background:var(--crack); color:#fff; text-decoration:none; transition:background .15s; letter-spacing:.02em; }
.btn-launch:hover { background:var(--crack2); }
.btn-ghost { font-size:13px; color:var(--smoke); text-decoration:none; transition:color .15s; }
.btn-ghost:hover { color:var(--paper); }

#proof { padding:20px 48px; border-top:1px solid var(--ink3); border-bottom:1px solid var(--ink3); display:flex; gap:48px; flex-wrap:wrap; align-items:center; }
.proof-item { display:flex; flex-direction:column; gap:2px; }
.proof-num { font-family:var(--serif); font-size:28px; color:var(--paper); letter-spacing:-.03em; }
.proof-lbl { font-family:var(--mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--smoke); }
.proof-sep { width:1px; height:36px; background:var(--ink3); }

#how { padding:100px 48px; max-width:1100px; margin:0 auto; }
.section-eyebrow { font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--smoke); margin-bottom:48px; }
.how-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:1px; background:var(--ink3); border:1px solid var(--ink3); }
.how-card { background:var(--ink); padding:36px 32px; transition:background .15s; }
.how-card:hover { background:var(--ink2); }
.how-num { font-family:var(--mono); font-size:11px; color:var(--crack); margin-bottom:20px; letter-spacing:.1em; }
.how-title { font-family:var(--serif); font-size:22px; color:var(--paper); margin-bottom:12px; line-height:1.2; }
.how-body { font-size:14px; color:var(--smoke); line-height:1.7; font-weight:300; }
.how-body strong { color:var(--mist); font-weight:400; }

#demo-strip { background:var(--ink2); border-top:1px solid var(--ink3); border-bottom:1px solid var(--ink3); padding:64px 48px; display:flex; align-items:center; justify-content:space-between; gap:48px; flex-wrap:wrap; }
.demo-copy { max-width:420px; }
.demo-copy h2 { font-family:var(--serif); font-size:clamp(28px,3vw,40px); color:var(--paper); line-height:1.15; margin-bottom:16px; }
.demo-copy p { font-size:15px; color:var(--smoke); line-height:1.7; font-weight:300; }
.demo-visual { flex:1; min-width:280px; max-width:520px; }
#mini-graph { width:100%; height:220px; display:block; }

#cta-section { padding:120px 48px; text-align:center; position:relative; overflow:hidden; }
#cta-section::before { content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:600px; height:600px; background:radial-gradient(circle,rgba(200,75,47,.08) 0%,transparent 70%); pointer-events:none; }
.cta-headline { font-family:var(--serif); font-size:clamp(36px,5vw,64px); color:var(--paper); line-height:1.1; margin-bottom:20px; position:relative; }
.cta-sub { font-size:16px; color:var(--smoke); margin-bottom:40px; font-weight:300; }
.cta-note { margin-top:16px; font-family:var(--mono); font-size:11px; color:var(--smoke); letter-spacing:.08em; }

footer { padding:28px 48px; border-top:1px solid var(--ink3); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; }
.footer-logo { font-family:var(--serif); font-size:15px; color:var(--smoke); }
.footer-logo em { color:var(--crack); font-style:normal; }
.footer-copy { font-size:12px; color:var(--ink3); }

@media (max-width:640px) {
  nav { padding:16px 24px; }
  #hero { padding:100px 24px 60px; }
  #proof { padding:20px 24px; gap:28px; }
  #how { padding:60px 24px; }
  #demo-strip { padding:48px 24px; }
  #cta-section { padding:80px 24px; }
  footer { padding:24px; }
  .proof-sep { display:none; }
}
@media (prefers-reduced-motion:reduce) { * { animation:none !important; transition:none !important; } }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">Fault<em>line</em></div>
  <div class="nav-right">
    <button class="lang-btn active" onclick="setLang('en')" id="btn-en">EN</button>
    <button class="lang-btn" onclick="setLang('es')" id="btn-es">ES</button>
    <a href="App/app.html" class="nav-cta" id="nav-cta-link">Open app →</a>
  </div>
</nav>

<section id="hero">
  <svg id="bg-canvas" aria-hidden="true"></svg>
  <div class="hero-eyebrow" id="t-eyebrow"></div>
  <h1 class="hero-headline" id="t-headline"></h1>
  <p class="hero-sub" id="t-sub"></p>
  <div class="hero-actions">
    <a href="App/app.html" class="btn-launch" id="t-launch"></a>
    <a href="#how" class="btn-ghost" id="t-scroll"></a>
  </div>
</section>

<div id="proof">
  <div class="proof-item"><span class="proof-num">+1K</span><span class="proof-lbl" id="t-p1"></span></div>
  <div class="proof-sep"></div>
  <div class="proof-item"><span class="proof-num">0</span><span class="proof-lbl" id="t-p2"></span></div>
  <div class="proof-sep"></div>
  <div class="proof-item"><span class="proof-num">3</span><span class="proof-lbl" id="t-p3"></span></div>
  <div class="proof-sep"></div>
  <div class="proof-item"><span class="proof-num">∞</span><span class="proof-lbl" id="t-p4"></span></div>
</div>

<section id="how">
  <div class="section-eyebrow" id="t-how-eyebrow"></div>
  <div class="how-grid">
    <div class="how-card"><div class="how-num" id="t-s1n"></div><div class="how-title" id="t-s1t"></div><p class="how-body" id="t-s1b"></p></div>
    <div class="how-card"><div class="how-num" id="t-s2n"></div><div class="how-title" id="t-s2t"></div><p class="how-body" id="t-s2b"></p></div>
    <div class="how-card"><div class="how-num" id="t-s3n"></div><div class="how-title" id="t-s3t"></div><p class="how-body" id="t-s3b"></p></div>
    <div class="how-card"><div class="how-num" id="t-s4n"></div><div class="how-title" id="t-s4t"></div><p class="how-body" id="t-s4b"></p></div>
  </div>
</section>

<div id="demo-strip">
  <div class="demo-copy">
    <h2 id="t-demo-h"></h2>
    <p id="t-demo-p"></p>
  </div>
  <div class="demo-visual">
    <svg id="mini-graph" aria-hidden="true"></svg>
  </div>
</div>

<section id="cta-section">
  <h2 class="cta-headline" id="t-cta-h"></h2>
  <p class="cta-sub" id="t-cta-s"></p>
  <a href="App/app.html" class="btn-launch" style="font-size:16px;padding:16px 40px" id="t-cta-btn"></a>
  <p class="cta-note" id="t-cta-note"></p>
</section>

<footer>
  <div class="footer-logo">Fault<em>line</em></div>
  <div class="footer-copy">MIT License</div>
</footer>

<script>
const T = {
  en: {
    lang: 'en',
    navCta: 'Open app →',
    eyebrow: 'Operational risk mapping',
    headline: 'Find the <span class="crack-word">crack</span><br>before everything<br>breaks.',
    sub: 'Draw your organization\'s dependency graph. <strong>Simulate failures. Discover single points.</strong> Run +1000 scenarios in seconds — right in your browser.',
    launch: 'Launch Faultline →',
    scroll: 'See how it works ↓',
    p1: 'simulations per run',
    p2: 'servers required',
    p3: 'modes: edit · what-if · monte carlo',
    p4: 'free, no account needed',
    howEyebrow: 'How it works',
    s1n:'01 — Map', s1t:'Draw your dependencies',
    s1b:'Add nodes for <strong>processes, people, systems, and vendors</strong>. Connect them with directed edges. Set a failure probability for each.',
    s2n:'02 — Break', s2t:'Ask "what if this fails?"',
    s2b:'Click any node to mark it as down. Faultline <strong>propagates the failure</strong> through every downstream dependency instantly.',
    s3n:'03 — Simulate', s3t:'Run Monte Carlo',
    s3b:'+1000 random scenarios using your own probabilities. See the <strong>average blast radius, worst case,</strong> and distribution — in under a second.',
    s4n:'04 — Act', s4t:'Fix what actually matters',
    s4b:'Tarjan\'s algorithm finds <strong>single points of failure</strong> automatically. No more guessing which node to harden first.',
    demoH: 'Your org\'s risk, made visible.',
    demoP: 'Most companies discover their single points of failure during an incident. Faultline lets you find them on a Tuesday afternoon, before anyone notices.',
    ctaH: 'Your next outage<br>is already mapped.',
    ctaS: 'You just haven\'t drawn it yet.',
    ctaBtn: 'Open Faultline — it\'s free →',
    ctaNote: 'No signup · No install · Runs in your browser',
  },
  es: {
    lang: 'es',
    navCta: 'Abrir app →',
    eyebrow: 'Mapeo de riesgo operacional',
    headline: 'Encuentra la <span class="crack-word">grieta</span><br>antes de que todo<br>colapse.',
    sub: 'Dibuja el grafo de dependencias de tu organización. <strong>Simula fallos. Descubre puntos únicos.</strong> Corre +1000 escenarios en segundos — directo en tu browser.',
    launch: 'Abrir Faultline →',
    scroll: 'Ver cómo funciona ↓',
    p1: 'simulaciones por corrida',
    p2: 'servidores necesarios',
    p3: 'modos: editar · qué pasa si · monte carlo',
    p4: 'gratis, sin cuenta',
    howEyebrow: 'Cómo funciona',
    s1n:'01 — Mapear', s1t:'Dibuja tus dependencias',
    s1b:'Agrega nodos para <strong>procesos, personas, sistemas y proveedores</strong>. Conéctalos con aristas dirigidas. Define la probabilidad de fallo de cada uno.',
    s2n:'02 — Romper', s2t:'Pregunta "¿qué pasa si falla?"',
    s2b:'Haz clic en cualquier nodo para marcarlo como caído. Faultline <strong>propaga el fallo</strong> por todas las dependencias aguas abajo al instante.',
    s3n:'03 — Simular', s3t:'Corre Monte Carlo',
    s3b:'+1000 escenarios aleatorios usando tus propias probabilidades. Ve el <strong>radio de impacto promedio, el peor caso</strong> y la distribución — en menos de un segundo.',
    s4n:'04 — Actuar', s4t:'Arregla lo que realmente importa',
    s4b:'El algoritmo de Tarjan encuentra <strong>puntos únicos de fallo</strong> automáticamente. Sin adivinar qué nodo reforzar primero.',
    demoH: 'El riesgo de tu org, hecho visible.',
    demoP: 'La mayoría de las empresas descubre sus puntos únicos de fallo durante un incidente. Faultline te deja encontrarlos un martes por la tarde, antes de que alguien se entere.',
    ctaH: 'Tu próximo outage<br>ya está mapeado.',
    ctaS: 'Solo falta que lo dibujes.',
    ctaBtn: 'Abrir Faultline — es gratis →',
    ctaNote: 'Sin registro · Sin instalación · Corre en tu browser',
  }
};

let currentLang = localStorage.getItem('fl-lang') || 'en';

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('fl-lang', lang);
  document.documentElement.lang = lang;
  document.getElementById('btn-en').classList.toggle('active', lang==='en');
  document.getElementById('btn-es').classList.toggle('active', lang==='es');
  const t = T[lang];
  document.title = lang==='en'
    ? 'Faultline — Find the crack before everything breaks'
    : 'Faultline — Encuentra la grieta antes de que todo colapse';
  document.getElementById('nav-cta-link').textContent = t.navCta;
  document.getElementById('t-eyebrow').textContent = t.eyebrow;
  document.getElementById('t-headline').innerHTML = t.headline;
  document.getElementById('t-sub').innerHTML = t.sub;
  document.getElementById('t-launch').textContent = t.launch;
  document.getElementById('t-scroll').textContent = t.scroll;
  document.getElementById('t-p1').textContent = t.p1;
  document.getElementById('t-p2').textContent = t.p2;
  document.getElementById('t-p3').textContent = t.p3;
  document.getElementById('t-p4').textContent = t.p4;
  document.getElementById('t-how-eyebrow').textContent = t.howEyebrow;
  ['1','2','3','4'].forEach(n => {
    document.getElementById('t-s'+n+'n').textContent = t['s'+n+'n'];
    document.getElementById('t-s'+n+'t').textContent = t['s'+n+'t'];
    document.getElementById('t-s'+n+'b').innerHTML  = t['s'+n+'b'];
  });
  document.getElementById('t-demo-h').textContent = t.demoH;
  document.getElementById('t-demo-p').textContent = t.demoP;
  document.getElementById('t-cta-h').innerHTML  = t.ctaH;
  document.getElementById('t-cta-s').textContent = t.ctaS;
  document.getElementById('t-cta-btn').textContent = t.ctaBtn;
  document.getElementById('t-cta-note').textContent = t.ctaNote;
}

// ── BG GRAPH ──
(function(){
  const svg=document.getElementById('bg-canvas');
  const W=window.innerWidth, H=window.innerHeight;
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  const nodes=[];
  const count=Math.floor(W*H/28000);
  for(let i=0;i<count;i++) nodes.push({x:Math.random()*W,y:Math.random()*H});
  nodes.forEach((a,i)=>{
    nodes.forEach((b,j)=>{
      if(j<=i) return;
      const dx=a.x-b.x,dy=a.y-b.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<180){
        const l=document.createElementNS('http://www.w3.org/2000/svg','line');
        l.setAttribute('x1',a.x);l.setAttribute('y1',a.y);
        l.setAttribute('x2',b.x);l.setAttribute('y2',b.y);
        l.setAttribute('stroke','#f0efe9');l.setAttribute('stroke-width','0.5');
        l.setAttribute('stroke-opacity',String(.3*(1-d/180)));
        svg.appendChild(l);
      }
    });
  });
  nodes.forEach((n,i)=>{
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',n.x);c.setAttribute('cy',n.y);c.setAttribute('r',3+Math.random()*4);
    const isCrack=i%9===0;
    c.setAttribute('fill',isCrack?'#c84b2f':'#f0efe9');
    c.setAttribute('fill-opacity',isCrack?'0.6':'0.25');
    svg.appendChild(c);
  });
})();

// ── MINI GRAPH ──
(function(){
  const svg=document.getElementById('mini-graph');
  const W=svg.clientWidth||480, H=220;
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  const ns=[
    {x:W*.5,y:40,label:'ERP',color:'#c84b2f',r:22,spof:true},
    {x:W*.25,y:110,label:'CRM',color:'#2ecc88',r:18},
    {x:W*.75,y:110,label:'Billing',color:'#f5a623',r:18},
    {x:W*.15,y:185,label:'Support',color:'#2ecc88',r:14},
    {x:W*.38,y:185,label:'Sales',color:'#2ecc88',r:14},
    {x:W*.62,y:185,label:'Ana G.',color:'#a78bfa',r:14},
    {x:W*.85,y:185,label:'Reports',color:'#2ecc88',r:14},
  ];
  const es=[[0,1],[0,2],[1,3],[1,4],[2,5],[2,6]];
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  defs.innerHTML=`<marker id="ma" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="rgba(160,165,180,.4)" stroke-width="1.5" stroke-linecap="round"/></marker>`;
  svg.appendChild(defs);
  es.forEach(([a,b])=>{
    const na=ns[a],nb=ns[b],dx=nb.x-na.x,dy=nb.y-na.y,l=Math.sqrt(dx*dx+dy*dy);
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',na.x);line.setAttribute('y1',na.y);
    line.setAttribute('x2',nb.x-(dx/l)*nb.r);line.setAttribute('y2',nb.y-(dy/l)*nb.r);
    line.setAttribute('stroke','rgba(160,165,180,.25)');line.setAttribute('stroke-width','1.5');
    line.setAttribute('marker-end','url(#ma)');
    svg.appendChild(line);
  });
  ns.forEach(n=>{
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    if(n.spof){
      const ring=document.createElementNS('http://www.w3.org/2000/svg','circle');
      ring.setAttribute('cx',n.x);ring.setAttribute('cy',n.y);ring.setAttribute('r',n.r+6);
      ring.setAttribute('fill','none');ring.setAttribute('stroke','#c84b2f');
      ring.setAttribute('stroke-width','2');ring.setAttribute('stroke-dasharray','4 3');ring.setAttribute('opacity','0.7');
      g.appendChild(ring);
      const tag=document.createElementNS('http://www.w3.org/2000/svg','text');
      tag.setAttribute('x',n.x+n.r+8);tag.setAttribute('y',n.y-6);
      tag.setAttribute('font-family','DM Mono,monospace');tag.setAttribute('font-size','9');
      tag.setAttribute('fill','#c84b2f');tag.setAttribute('letter-spacing','0.08em');
      tag.textContent='SPOF'; g.appendChild(tag);
    }
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',n.x);c.setAttribute('cy',n.y);c.setAttribute('r',n.r);
    c.setAttribute('fill',n.color);c.setAttribute('fill-opacity','0.85');
    g.appendChild(c);
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',n.x);t.setAttribute('y',n.y+4);t.setAttribute('text-anchor','middle');
    t.setAttribute('font-family','DM Sans,sans-serif');t.setAttribute('font-size',n.r>16?'11':'9');
    t.setAttribute('fill','#f0efe9');t.setAttribute('pointer-events','none');
    t.textContent=n.label; g.appendChild(t);
    svg.appendChild(g);
  });
})();

setLang(currentLang);
</script>
</body>
</html>
